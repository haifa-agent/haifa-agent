name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    verify:
        name: Verify (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven
            - name: Verify architecture and tests (Unix)
              if: runner.os != 'Windows'
              run: ./mvnw --batch-mode --no-transfer-progress -T 1C -Pci-fast clean verify
            - name: Verify architecture and tests (Windows)
              if: runner.os == 'Windows'
              run: .\mvnw.cmd --batch-mode --no-transfer-progress -T 1C -Pci-fast clean verify
