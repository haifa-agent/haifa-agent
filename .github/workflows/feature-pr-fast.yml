name: Feature PR Fast

on:
    pull_request:
        branches: [dev]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: feature-pr-fast-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: Fast verify
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven
            - name: Verify architecture and tests
              run: sh ./mvnw --batch-mode --no-transfer-progress -T 1C -Pci-fast clean verify
