name: Dev Integration

on:
    push:
        branches: [dev]
    merge_group:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: dev-integration-${{ github.ref }}
    cancel-in-progress: true

jobs:
    fast-cross-platform:
        name: Fast verify (${{ matrix.os }})
        if: github.event_name != 'merge_group' || github.event.merge_group.base_ref == 'refs/heads/dev'
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven
            - name: Verify architecture and tests (Unix)
              if: runner.os != 'Windows'
              run: sh ./mvnw --batch-mode --no-transfer-progress -T 1C -Pci-fast clean verify
            - name: Verify architecture and tests (Windows)
              if: runner.os == 'Windows'
              run: .\mvnw.cmd --batch-mode --no-transfer-progress -T 1C -Pci-fast clean verify

    integration:
        name: Integration verify
        if: github.event_name != 'merge_group' || github.event.merge_group.base_ref == 'refs/heads/dev'
        runs-on: ubuntu-latest
        needs: fast-cross-platform
        timeout-minutes: 35
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven
            - name: Run Failsafe integration route
              run: sh ./mvnw --batch-mode --no-transfer-progress -T 1C -Pci-integration -DskipITs=false verify
