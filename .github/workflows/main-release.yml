name: Main Release Gate

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
        tags: ["v*"]
    merge_group:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: main-release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release-gate:
        name: Release gate
        if: github.event_name != 'merge_group' || github.event.merge_group.base_ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - name: Require dev as source for main PR
              if: github.event_name == 'pull_request' && github.head_ref != 'dev'
              run: |
                  echo "Only dev may open PRs into main."
                  exit 1
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven
            - name: Fast release verification
              run: sh ./mvnw --batch-mode --no-transfer-progress -T 1C -Pci-fast clean verify
            - name: Integration release verification
              run: sh ./mvnw --batch-mode --no-transfer-progress -T 1C -Pci-integration -DskipITs=false clean verify
            - name: Maven release profile verification
              run: sh ./mvnw -Prelease verify
            - name: Package CLI
              run: sh ./mvnw -pl :haifa-agent-cli -am package
            - name: CLI entrypoint smoke
              run: java -jar haifa-agent-applications/haifa-agent-cli/target/haifa-agent-cli-0.1.0-SNAPSHOT.jar --help
